name: Deploy OCI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build frontend
        working-directory: apps/web
        env:
          VITE_FEATURE_CONNECTIONS_ENABLED: "false"
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: "0"
        run: |
          npm ci
          npm run build

      - name: Scan tracked files for secret-like patterns
        run: bash scripts/scan_secret_patterns.sh

      - name: Verify no admin token was baked into the frontend build
        run: |
          if grep -R -nE "VITE_ADMIN_API_TOKEN|ci-admin-token|change-me-admin-token" apps/web/dist; then
            echo "Unexpected admin token material found in apps/web/dist" >&2
            exit 1
          fi

      - name: Prepare release archive
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"
          ARCHIVE_PATH="/tmp/pokeleximon-${RELEASE_ID}.tgz"
          tar \
            --exclude-vcs \
            --exclude='./apps/web/node_modules' \
            --exclude='./apps/web/dist' \
            --exclude='./apps/web/test-results' \
            --exclude='./services/api/.venv' \
            --exclude='./services/api/.pytest_cache' \
            --exclude='*/__pycache__' \
            --exclude='*/.pytest_cache' \
            -czf "${ARCHIVE_PATH}" .
          echo "RELEASE_ID=${RELEASE_ID}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_PATH=${ARCHIVE_PATH}" >> "${GITHUB_ENV}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_DEPLOY_SSH_KEY }}

      - name: Trust OCI host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.OCI_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy release bundle and deploy script
        run: |
          scp "${ARCHIVE_PATH}" "${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_DEPLOY_HOST }}:/tmp/pokeleximon-${RELEASE_ID}.tgz"
          scp infra/production/oci/bin/deploy_remote.sh "${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_DEPLOY_HOST }}:/tmp/deploy_remote.sh"

      - name: Deploy on OCI host
        run: |
          ssh "${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_DEPLOY_HOST }}" \
            "chmod 755 /tmp/deploy_remote.sh && sudo /tmp/deploy_remote.sh --release-archive /tmp/pokeleximon-${RELEASE_ID}.tgz --release-id ${RELEASE_ID}"
